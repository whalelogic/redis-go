<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Redis Quick Survey{{end}}</title>
    <style>
        :root {
            --primary-color: #fc216e;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            font-family: Ubuntu, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        header h1 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        main {
            flex-grow: 1;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        footer {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
        }

        /* Common Survey Styles */
        h2 { margin-top: 0; font-size: 1.5rem; }
        form { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        input[type="text"] {
            padding: 0.625rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-size: 1rem;
        }
        input[type="submit"] {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.625rem;
            border-radius: 0.375rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        input[type="submit"]:hover { background-color: #fc216e; }
        
        .results { margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1rem; }
        .results h3 { font-size: 1.125rem; margin-bottom: 0.75rem; }
        ul { list-style: none; padding: 0; }
        li { 
            background: #f3f4f6; 
            margin-bottom: 0.5rem; 
            padding: 0.5rem 0.75rem; 
            border-radius: 0.25rem;
            font-family: Ubuntu, monospace;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>RedisGo Survey</h1>
    </header>

    <main>
        <div class="card">
            {{block "content" .}}{{end}}
        </div>
    </main>

    <footer>
        &copy; 2026 Redis-Go-Quick Survey App
    </footer>
</body>
</html>
